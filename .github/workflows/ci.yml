name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  domain-types-drift:
    name: Domain types — mirror drift check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assert app and server domain types are byte-identical
        # server/src/domain/types.ts is canonical; app/src/domain/types.ts is a verbatim mirror.
        # No shared package yet (two package roots) — this guards the mirror until one exists.
        run: |
          if ! diff -u server/src/domain/types.ts app/src/domain/types.ts; then
            echo "::error::Domain types drifted. app/src/domain/types.ts must be a byte-identical mirror of server/src/domain/types.ts (server is canonical). Run: cp server/src/domain/types.ts app/src/domain/types.ts && recommit."
            exit 1
          fi

  server:
    name: Server — typecheck + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    services:
      # Real Postgres 16 so the schema/constraint tests run in CI (they skip when
      # TEST_DATABASE_URL is unset). Same major as the compose game-db.
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: battleapp_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/battleapp_dev
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  app:
    name: App — typecheck + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test -- --ci
