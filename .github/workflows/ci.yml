name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  domain-types-drift:
    name: Domain types — mirror drift check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assert app and server domain types are byte-identical
        # server/src/domain/types.ts is canonical; app/src/domain/types.ts is a verbatim mirror.
        # No shared package yet (two package roots) — this guards the mirror until one exists.
        run: |
          if ! diff -u server/src/domain/types.ts app/src/domain/types.ts; then
            echo "::error::Domain types drifted. app/src/domain/types.ts must be a byte-identical mirror of server/src/domain/types.ts (server is canonical). Run: cp server/src/domain/types.ts app/src/domain/types.ts && recommit."
            exit 1
          fi

  server:
    name: Server — typecheck + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  app:
    name: App — typecheck + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test -- --ci
